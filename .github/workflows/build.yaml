name: "Build 🧱"
on:
  workflow_call:
    inputs:
      bundle_upload:
        type: boolean
        default: true
        required: false
      repo_upload:
        type: boolean
        default: false
        required: false
      pages_deploy:
        type: boolean
        default: false
        required: false
      repo_deploy:
        type: boolean
        default: false
        required: false

jobs:
  build:
    name: "Flatpak 📦"
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
      volumes:
        - /usr:/host/usr
        - /opt:/host/opt
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
    - name: "Recover host disk space"
      run: |
        : Recover host disk space
        rm -rf /host/opt/hostedtoolcache/CodeQL
        rm -rf /host/opt/hostedtoolcache/go
        rm -rf /host/usr/local/lib/android
        rm -rf /host/usr/local/.ghcup
        rm -rf /host/usr/local/share/powershell
        rm -rf /host/usr/share/swift
        rm -rf /host/usr/share/dotnet

        echo ::group::Available disc space
        df -h
        echo ::endgroup::

    - name: "Repo checkout"
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: "Clone Mixxx repository"
      run: |
        : Clone Mixxx repository
        git clone --single-branch --branch main https://github.com/mixxxdj/mixxx.git

    - name: "Store Git version"
      run: |
        : Store Git version
        GIT_DESC=$(git -C mixxx describe --always --first-parent --dirty=-modified)

        if [ -z "$GIT_DESC" ]; then
          GIT_DESC="unknown"
        fi
        echo "GIT_DESC=$GIT_DESC" >> $GITHUB_ENV

        echo ::group::Git version
        echo $GIT_DESC
        echo ::endgroup::

    - name: "Update MetaInfo metadata"
      run: |
        : Update MetaInfo metadata

        echo ::group::Extracted metadata
        python scripts/update_metainfo.py
        echo ::endgroup::

    - name: "Validate metadata"
      run: |
        flatpak-builder-lint --exceptions \
          --user-exceptions checks/exceptions.json appstream org.mixxx.Mixxx.Devel.metainfo.xml

    - name: "Validate manifest"
      run: |
        flatpak-builder-lint --exceptions \
          --user-exceptions checks/exceptions.json manifest org.mixxx.Mixxx.Devel.json

    - name: "Build Flatpak"
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        manifest-path: org.mixxx.Mixxx.Devel.json
        arch: ${{ matrix.variant.arch }}
        build-bundle: false
        upload-artifact: false

    - name: "Sign repo commit"
      if: env.GPG_PRIVATE_KEY && env.GPG_KEY_ID
      run: |
        : Sign repo commit
        gpg --import <(echo "${{ secrets.GPG_PRIVATE_KEY }}")
        flatpak build-sign --gpg-sign="${{ secrets.GPG_KEY_ID }}" repo org.mixxx.Mixxx.Devel
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

    - name: "Validate repository"
      run: |
        : Validate repository
        flatpak-builder-lint --exceptions --user-exceptions checks/exceptions.json repo repo

    - name: "Create Flatpak bundle"
      run: |
        : Create Flatpak bundle
        flatpak build-bundle --arch=${{ matrix.variant.arch }} repo \
          Mixxx-Devel-${GIT_DESC}_${{ matrix.variant.arch }}.flatpak org.mixxx.Mixxx.Devel

    - name: "Create Flatpak Debug extension"
      run: |
        : Create Flatpak Debug extension
        flatpak build-bundle --arch=${{ matrix.variant.arch }} repo \
          --runtime Mixxx-Devel-${GIT_DESC}_${{ matrix.variant.arch }}.Debug.flatpak org.mixxx.Mixxx.Devel.Debug

    - name: "Prepare bundle directory"
      run: |
        : Prepare bundle directory
        mkdir -p bundle
        mv Mixxx-Devel-${GIT_DESC}_${{ matrix.variant.arch }}.flatpak bundle
        mv Mixxx-Devel-${GIT_DESC}_${{ matrix.variant.arch }}.Debug.flatpak bundle

        echo ::group::Bundle files
        ls -l bundle
        echo ::endgroup::

    - name: "Upload bundles"
      uses: actions/Upload-artifact@v6
      if: inputs.bundle_upload
      with:
        name: bundle_${{ matrix.variant.arch }}
        path: bundle

    - name: "Upload repo"
      uses: actions/Upload-artifact@v6
      if: inputs.repo_upload
      with:
        name: repo_${{ matrix.variant.arch }}
        path: repo

  repo:
    name: "Repository 🛒"
    runs-on: ubuntu-latest
    needs: build
    if: inputs.repo_upload && inputs.repo_deploy
    steps:
      - name: "Download repositories"
        uses: actions/download-artifact@v4
        with:
          pattern: repo_*
      - name: "Deploy repositories"
        run: |
          echo "Placeholder for repository deploy"

  pages:
    name: "Pages 📖"
    runs-on: ubuntu-latest
    needs: build
    if: inputs.bundle_upload && inputs.pages_deploy
    steps:
      - name: "Download bundles"
        uses: actions/download-artifact@v4
        with:
          pattern: bundle_*
          path: bundle
          merge-multiple: true
      - name: "Upload bundles"
        uses: actions/upload-pages-artifact@v3
        with:
          path: bundle

  deploy:
    name: "Deploy 🚀"
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: pages
    if: inputs.bundle_upload && inputs.pages_deploy
    steps:
      - name: "Deploy to Pages"
        uses: actions/deploy-pages@v4
